services:
  - type: web
    name: heart-predict-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: PYTHON_PATH
        value: python3
      - key: ML_DIR
        value: ./ml
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://heart-predict.vercel.app
    healthCheckPath: /health
    autoDeploy: true
